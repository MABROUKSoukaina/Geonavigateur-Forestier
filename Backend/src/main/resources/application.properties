spring.application.name=ifn_2026

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── PostgreSQL Datasource ────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/IFN_2026
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── H2 Console (disabled in favour of PostgreSQL) ───────────────────────────
spring.h2.console.enabled=false

# ─── Hardcoded users ─────────────────────────────────────────────────────────
app.users.admin.password=Admin@IFN26
app.users.directeur.password=Direct@IFN26
app.users.chef_dept.password=Chef@IFN26
app.users.visiteur.password=Visit@IFN26

# ─── JWT ─────────────────────────────────────────────────────────────────────
app.jwt.secret=IFN2026JwtSecretKeyForHmacSha256MustBeAtLeast32Chars
app.jwt.expiration-ms=31536000000
